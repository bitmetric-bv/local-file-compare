<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Comparison Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }

    body {
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fafafa;
      color: #333;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #1f1f1f;
      color: #e0e0e0;
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar h1 { font-size: 17px; font-weight: 700; color: #fff; }
    .sidebar > div > p { font-size: 12px; color: #888; line-height: 1.4; margin-top: 3px; }
    .sidebar h2 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: #aaa; margin-bottom: 8px;
    }

    .upload-zone {
      border: 2px dashed #444; border-radius: 6px; padding: 14px;
      text-align: center; cursor: pointer; transition: all 0.18s;
    }
    .upload-zone:hover { border-color: #777; background: rgba(255,255,255,0.02); }
    .upload-zone.dragover { border-color: #66bb6a; background: rgba(102,187,106,0.08); }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone-label { font-size: 12px; color: #bbb; cursor: pointer; display: block; }
    .file-name { font-size: 11px; color: #66bb6a; margin-top: 6px; word-break: break-all; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: #bbb; font-weight: 500; }

    .sidebar select {
      background: #2a2a2a; border: 1px solid #444; color: #e0e0e0;
      padding: 7px 10px; border-radius: 4px; font-size: 12px; font-family: inherit; width: 100%;
    }
    .sidebar select:focus { outline: none; border-color: #66bb6a; }
    .sidebar select:disabled { opacity: 0.4; cursor: not-allowed; }

    .checkbox-group {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 180px; overflow-y: auto; padding: 8px;
      background: rgba(0,0,0,0.2); border-radius: 4px;
    }
    .checkbox-item { display: flex; align-items: center; gap: 7px; }
    .checkbox-item input[type="checkbox"] { cursor: pointer; }
    .checkbox-item label { font-size: 12px; color: #ccc; cursor: pointer; font-weight: normal; }

    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    .btn-primary {
      flex: 1; background: #66bb6a; color: white; border: none;
      padding: 9px 14px; border-radius: 4px; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #56ab5a; }
    .btn-primary:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
    .btn-secondary {
      background: #333; color: #ccc; border: 1px solid #444;
      padding: 9px 14px; border-radius: 4px; font-size: 12px;
      font-weight: 500; cursor: pointer; transition: background 0.15s;
    }
    .btn-secondary:hover { background: #444; }

    /* ── Main area ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; padding: 20px; gap: 12px; position: relative;
    }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: absolute; inset: 0; background: rgba(250,250,250,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; flex-direction: column; gap: 16px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0; border-top-color: #66bb6a;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { font-size: 14px; color: #555; font-weight: 500; }
    .progress-track {
      width: 260px; height: 6px; background: #e0e0e0;
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #66bb6a; width: 0%;
      transition: width 0.2s ease; border-radius: 3px;
    }
    .progress-pct { font-size: 12px; color: #888; }

    /* ── Summary bar ── */
    .status-bar {
      background: white; border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 14px 18px; display: flex; gap: 32px; font-size: 13px; flex-wrap: wrap;
    }
    .status-bar.hidden { display: none; }
    .status-item { display: flex; flex-direction: column; gap: 2px; }
    .status-label { color: #888; font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
    .status-value { font-size: 20px; font-weight: 700; color: #333; font-variant-numeric: tabular-nums; }
    .status-value.match  { color: #2e7d32; }
    .status-value.diff   { color: #c62828; }
    .status-value.only   { color: #e65100; }

    /* ── Controls bar ── */
    .controls {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .controls.hidden { display: none; }
    .search-box { flex: 1; min-width: 220px; }
    .search-box input {
      width: 100%; padding: 7px 11px; border: 1px solid #ddd;
      border-radius: 4px; font-size: 13px; background: white; color: #333;
    }
    .search-box input:focus { outline: none; border-color: #66bb6a; }

    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      background: white; color: #555; border: 1px solid #d0d0d0;
      padding: 5px 13px; border-radius: 20px; font-size: 12px;
      font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .pill:hover { border-color: #999; background: #f5f5f5; }
    .pill.active                             { background: #1f1f1f; color: white; border-color: #1f1f1f; }
    .pill[data-filter="match"].active        { background: #2e7d32; border-color: #2e7d32; }
    .pill[data-filter="difference"].active   { background: #c62828; border-color: #c62828; }
    .pill[data-filter="only-in-a"].active    { background: #e65100; border-color: #e65100; }
    .pill[data-filter="only-in-b"].active    { background: #e65100; border-color: #e65100; }

    .btn-export {
      background: #1f1f1f; color: white; border: none;
      padding: 7px 14px; border-radius: 4px; font-size: 12px;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s;
    }
    .btn-export:hover { background: #333; }

    /* ── Table ── */
    .table-container {
      flex: 1; background: white; border: 1px solid #e0e0e0;
      border-radius: 6px; overflow: auto; position: relative;
    }
    .empty-state {
      display: flex; align-items: center; justify-content: center;
      height: 100%; flex-direction: column; color: #bbb; gap: 8px;
    }
    .empty-state p { font-size: 14px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
    thead {
      position: sticky; top: 0; background: #f4f4f4;
      border-bottom: 2px solid #e0e0e0; z-index: 10;
    }
    th {
      padding: 10px 12px; text-align: left; font-weight: 600; color: #444;
      white-space: nowrap; user-select: none; border-right: 1px solid #e0e0e0;
    }
    th:last-child { border-right: none; }
    th.sortable { cursor: pointer; }
    th.sortable:hover { background: #ebebeb; }
    th.sortable::after       { content: " ↕"; color: #bbb; font-size: 10px; }
    th.sorted-asc::after     { content: " ↑"; color: #333; }
    th.sorted-desc::after    { content: " ↓"; color: #333; }

    td {
      padding: 9px 12px; border-bottom: 1px solid #f0f0f0;
      border-right: 1px solid #f0f0f0; white-space: nowrap;
    }
    td:last-child { border-right: none; }
    tr:hover td { background: #fafafa; }

    /* spacer rows (virtual scroll) must not show hover tint or border */
    tr.virt-spacer td { padding: 0; border: none; background: transparent !important; }

    .status-cell { font-weight: 600; }
    .status-match { color: #2e7d32; }
    .status-diff  { color: #c62828; }
    .status-only  { color: #e65100; }

    .num {
      font-family: "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
      text-align: right;
    }
    .diff-zero     { background: #e8f5e9; color: #2e7d32; font-weight: 600; }
    .diff-nonzero  { background: #ffebee; color: #c62828; font-weight: 600; }
    .diff-text     { background: #f5f5f5; color: #888; }

    .hidden { display: none; }
  </style>
</head>
<body>

<!-- ════════════════════ SIDEBAR ════════════════════ -->
<div class="sidebar">
  <div>
    <h1>File Comparison</h1>
    <p>Load two files and compare them row by row</p>
  </div>

  <div>
    <h2>File A</h2>
    <div class="upload-zone" id="uploadZoneA">
      <label class="upload-zone-label">📁 Click or drop CSV / XLSX</label>
      <input type="file" id="fileInputA" accept=".csv,.xlsx,.xls">
      <div class="file-name" id="fileNameA"></div>
    </div>
  </div>

  <div>
    <h2>File B</h2>
    <div class="upload-zone" id="uploadZoneB">
      <label class="upload-zone-label">📁 Click or drop CSV / XLSX</label>
      <input type="file" id="fileInputB" accept=".csv,.xlsx,.xls">
      <div class="file-name" id="fileNameB"></div>
    </div>
  </div>

  <div id="configSection" class="hidden">
    <div class="form-group">
      <label for="keyColumn">Key column</label>
      <select id="keyColumn" disabled>
        <option value="">Select a key column…</option>
      </select>
    </div>

    <div class="form-group" style="margin-top:12px">
      <label>Value columns to compare</label>
      <div class="checkbox-group" id="valueColumnsGroup"></div>
    </div>

    <div class="btn-row" style="margin-top:12px">
      <button class="btn-primary" id="compareBtn" disabled>Compare files</button>
      <button class="btn-secondary" id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<!-- ════════════════════ MAIN ════════════════════ -->
<div class="main">

  <!-- Loading overlay -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-label" id="loadingLabel">Comparing files…</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-pct" id="progressPct">0 %</div>
  </div>

  <!-- Summary bar -->
  <div class="status-bar hidden" id="statusBar">
    <div class="status-item">
      <div class="status-label">Total rows</div>
      <div class="status-value" id="totalRows">0</div>
    </div>
    <div class="status-item">
      <div class="status-label">Matches</div>
      <div class="status-value match" id="matchCount">0</div>
    </div>
    <div class="status-item">
      <div class="status-label">Differences</div>
      <div class="status-value diff" id="diffCount">0</div>
    </div>
    <div class="status-item">
      <div class="status-label">Only in A</div>
      <div class="status-value only" id="onlyACount">0</div>
    </div>
    <div class="status-item">
      <div class="status-label">Only in B</div>
      <div class="status-value only" id="onlyBCount">0</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls hidden" id="controlsBar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by key value…">
    </div>
    <div class="filter-pills">
      <button class="pill active" data-filter="">All</button>
      <button class="pill" data-filter="match">Matches</button>
      <button class="pill" data-filter="difference">Differences</button>
      <button class="pill" data-filter="only-in-a">Only in A</button>
      <button class="pill" data-filter="only-in-b">Only in B</button>
    </div>
    <button class="btn-export" id="exportBtn">⬇ Download CSV</button>
  </div>

  <!-- Table -->
  <div class="table-container" id="tableContainer">
    <div id="emptyState" class="empty-state">
      <p>Upload two files to get started</p>
    </div>
    <table id="resultsTable" class="hidden">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// Number normalisation  (used both on main thread and in Worker)
// ════════════════════════════════════════════════════════════════
function toNum(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') return isNaN(val) ? null : val;
  let s = val.toString().trim();
  // strip currency symbols, thin/non-breaking spaces
  s = s.replace(/[€$£¥\u00a0\u202f\u2009]/g, '').replace(/\s/g, '');
  if (s === '') return 0;
  // European thousands  1.234,56  or  1.234
  if (/^-?\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)) {
    const n = parseFloat(s.replace(/\./g, '').replace(',', '.'));
    return isNaN(n) ? null : n;
  }
  // European decimal without thousands  1234,56
  if (/^-?\d+(,\d+)$/.test(s)) {
    const n = parseFloat(s.replace(',', '.'));
    return isNaN(n) ? null : n;
  }
  // US thousands  1,234.56  or  1,234
  if (/^-?\d{1,3}(,\d{3})*(\.\d+)?$/.test(s)) {
    const n = parseFloat(s.replace(/,/g, ''));
    return isNaN(n) ? null : n;
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function isNumericVal(val) {
  if (val === null || val === undefined || val === '') return true;
  return toNum(val) !== null;
}

// ════════════════════════════════════════════════════════════════
// Comparison  (runs in Worker; also called from main thread for
//              the worker-source-via-toString trick)
// ════════════════════════════════════════════════════════════════
function compareData(fileA, fileB, keyColumn, valueColumns, postProgress) {
  postProgress = postProgress || function() {};
  const results = [];

  // Build O(1) lookup for file B
  const bLookup = Object.create(null);
  fileB.forEach(function(row) {
    const key = row[keyColumn];
    if (key !== undefined && key !== null) bLookup[String(key)] = row;
  });

  const totalA = fileA.length || 1;

  fileA.forEach(function(row, idx) {
    const key = row[keyColumn];
    if (key === undefined || key === null) return;
    const keyStr = String(key);
    const bRow = bLookup[keyStr];

    const resultRow = { key: key, status: '', values: [] };
    let hasDifference = false;

    valueColumns.forEach(function(col) {
      const aRaw = row[col];
      const bRaw = bRow ? (bRow[col] !== undefined ? bRow[col] : '') : '';
      const aNum = toNum(aRaw);
      const bNum = toNum(bRaw);
      const isNum = isNumericVal(aRaw) && isNumericVal(bRaw);
      // Round to 2 decimals before comparing and computing diff
      var aR2 = (isNum && aNum !== null) ? Math.round(aNum * 100) / 100 : aNum;
      var bR2 = (isNum && bNum !== null) ? Math.round(bNum * 100) / 100 : bNum;
      const diff = (isNum && aR2 !== null && bR2 !== null) ? (bR2 - aR2) : null;

      resultRow.values.push({
        column: col,
        aVal: aRaw !== undefined ? aRaw : '',
        bVal: bRaw,
        aNum: aR2,
        bNum: bR2,
        diff: diff,
        isNumeric: isNum,
      });

      // Compare using rounded numbers to avoid float-format false differences
      const aNorm = isNum ? aR2 : (aRaw !== undefined ? String(aRaw) : '');
      const bNorm = isNum ? bR2 : String(bRaw);
      if (aNorm !== bNorm) hasDifference = true;
    });

    resultRow.status = !bRow ? 'Only in A' : (hasDifference ? 'Difference' : 'Match');
    results.push(resultRow);

    if (idx % 5000 === 4999) postProgress(Math.round((idx + 1) / totalA * 80));
  });

  // Find rows only in B
  const aKeySet = Object.create(null);
  fileA.forEach(function(r) {
    const k = r[keyColumn];
    if (k !== undefined && k !== null) aKeySet[String(k)] = true;
  });
  fileB.forEach(function(row) {
    const key = row[keyColumn];
    if (key === undefined || key === null) return;
    if (aKeySet[String(key)]) return;

    const resultRow = { key: key, status: 'Only in B', values: [] };
    valueColumns.forEach(function(col) {
      const bRaw = row[col];
      resultRow.values.push({
        column: col,
        aVal: '',
        bVal: bRaw !== undefined ? bRaw : '',
        diff: null,
        isNumeric: isNumericVal(bRaw),
      });
    });
    results.push(resultRow);
  });

  postProgress(100);
  return results;
}

// ════════════════════════════════════════════════════════════════
// Web Worker  (built from .toString() so no code duplication)
// ════════════════════════════════════════════════════════════════
const WORKER_SRC = [
  toNum.toString(),
  isNumericVal.toString(),
  compareData.toString(),
  `self.onmessage = function(e) {
    var d = e.data;
    var results = compareData(
      d.fileA, d.fileB, d.keyColumn, d.valueColumns,
      function(pct) { self.postMessage({ type: 'progress', pct: pct }); }
    );
    self.postMessage({ type: 'done', results: results });
  };`
].join('\n\n');

let activeWorker = null;

function runComparison(keyColumn, valueColumns) {
  if (activeWorker) { activeWorker.terminate(); activeWorker = null; }

  setLoading(true, 0);
  document.getElementById('compareBtn').disabled = true;

  const blob = new Blob([WORKER_SRC], { type: 'application/javascript' });
  const url  = URL.createObjectURL(blob);
  activeWorker = new Worker(url);
  URL.revokeObjectURL(url);

  activeWorker.onmessage = function(e) {
    if (e.data.type === 'progress') {
      setLoading(true, e.data.pct);
    } else if (e.data.type === 'done') {
      setLoading(false);
      document.getElementById('compareBtn').disabled = false;
      state.valueColumns = valueColumns;
      renderResults(e.data.results);
      activeWorker = null;
    }
  };

  activeWorker.onerror = function(e) {
    setLoading(false);
    document.getElementById('compareBtn').disabled = false;
    alert('Comparison failed: ' + e.message);
    activeWorker = null;
  };

  activeWorker.postMessage({
    fileA: state.fileA, fileB: state.fileB,
    keyColumn: keyColumn, valueColumns: valueColumns,
  });
}

function setLoading(visible, pct) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !visible);
  if (pct !== undefined) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + ' %';
  }
}

// ════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════
const state = {
  fileA: null, fileB: null,
  columnsA: [], columnsB: [],
  results: [], filtered: [],
  valueColumns: [],
  sortColumn: null, sortAsc: true,
};

// ════════════════════════════════════════════════════════════════
// File parsing
// ════════════════════════════════════════════════════════════════
function parseFile(file) {
  return new Promise(function(resolve, reject) {
    if (file.name.match(/\.csv$/i)) {
      Papa.parse(file, {
        header: true, skipEmptyLines: true,
        complete: function(r) { resolve(r.data || []); },
        error: reject,
      });
    } else if (file.name.match(/\.xlsx?$/i)) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wb   = XLSX.read(e.target.result, { type: 'array' });
          const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          resolve(data || []);
        } catch(err) { reject(err); }
      };
      reader.onerror = function() { reject(new Error('Failed to read file')); };
      reader.readAsArrayBuffer(file);
    } else {
      reject(new Error('Unsupported file format'));
    }
  });
}

function getColumns(data) {
  return data && data.length ? Object.keys(data[0]) : [];
}

// ════════════════════════════════════════════════════════════════
// Upload zones
// ════════════════════════════════════════════════════════════════
function setupUploadZone(zoneId, inputId, side) {
  const zone  = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  zone.addEventListener('click', function() { input.click(); });
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFileUpload(e.dataTransfer.files[0], side);
  });
  input.addEventListener('change', function(e) {
    if (e.target.files.length) handleFileUpload(e.target.files[0], side);
  });
}

async function handleFileUpload(file, side) {
  try {
    const data = await parseFile(file);
    if (!data.length) { alert('File appears to be empty.'); return; }
    if (side === 'A') {
      state.fileA = data; state.columnsA = getColumns(data);
      document.getElementById('fileNameA').textContent = file.name;
    } else {
      state.fileB = data; state.columnsB = getColumns(data);
      document.getElementById('fileNameB').textContent = file.name;
    }
    refreshConfigUI();
  } catch(err) {
    alert('Failed to parse file: ' + err.message);
  }
}

function refreshConfigUI() {
  const ready = !!(state.fileA && state.fileB);
  document.getElementById('configSection').classList.toggle('hidden', !ready);
  if (!ready) return;

  // Key column: must exist in both files
  const common = state.columnsA.filter(function(c) { return state.columnsB.includes(c); });
  const keySelect = document.getElementById('keyColumn');
  keySelect.disabled = false;
  keySelect.innerHTML = '<option value="">Select a key column…</option>';
  common.forEach(function(col) {
    const o = document.createElement('option');
    o.value = col; o.textContent = col;
    keySelect.appendChild(o);
  });

  // Value columns: union of both files
  const all = Array.from(new Set([...state.columnsA, ...state.columnsB]));
  const group = document.getElementById('valueColumnsGroup');
  group.innerHTML = '';
  all.forEach(function(col) {
    const wrap = document.createElement('div');
    wrap.className = 'checkbox-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.id = 'col-' + col; cb.value = col;
    const lbl = document.createElement('label');
    lbl.htmlFor = 'col-' + col; lbl.textContent = col;
    wrap.appendChild(cb); wrap.appendChild(lbl);
    group.appendChild(wrap);
  });
}

// ════════════════════════════════════════════════════════════════
// Rendering
// ════════════════════════════════════════════════════════════════
function renderResults(results) {
  state.results = results;
  state.filtered = results.slice();
  // Reset filters to "All"
  document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
  document.querySelector('.pill[data-filter=""]').classList.add('active');
  document.getElementById('searchInput').value = '';
  updateStatusBar();
  renderTable();
}

function updateStatusBar() {
  const r = state.results;
  const counts = { total: r.length, match: 0, diff: 0, onlyA: 0, onlyB: 0 };
  r.forEach(function(row) {
    if (row.status === 'Match')       counts.match++;
    else if (row.status === 'Difference') counts.diff++;
    else if (row.status === 'Only in A')  counts.onlyA++;
    else if (row.status === 'Only in B')  counts.onlyB++;
  });
  document.getElementById('totalRows').textContent  = counts.total.toLocaleString();
  document.getElementById('matchCount').textContent  = counts.match.toLocaleString();
  document.getElementById('diffCount').textContent   = counts.diff.toLocaleString();
  document.getElementById('onlyACount').textContent  = counts.onlyA.toLocaleString();
  document.getElementById('onlyBCount').textContent  = counts.onlyB.toLocaleString();
  document.getElementById('statusBar').classList.remove('hidden');
  document.getElementById('controlsBar').classList.remove('hidden');
  document.getElementById('emptyState').classList.add('hidden');
}

// ════════════════════════════════════════════════════════════════
// Virtual-scroll table
// ════════════════════════════════════════════════════════════════
const ROW_H  = 39;   // px per data row  (padding 9+9 + 1 border + ~20 text)
const OVER   = 25;   // rows to render above and below visible window
let   scrollBound = false;

function colCount() { return 2 + state.valueColumns.length * 3; }

function buildDataRow(row) {
  const tr = document.createElement('tr');

  // Key
  const keyTd = document.createElement('td');
  keyTd.textContent = row.key;
  keyTd.style.fontWeight = '600';
  tr.appendChild(keyTd);

  // Status
  const stTd = document.createElement('td');
  stTd.className = 'status-cell';
  stTd.textContent = row.status;
  const cls = { 'Match': 'status-match', 'Difference': 'status-diff',
                'Only in A': 'status-only', 'Only in B': 'status-only' };
  if (cls[row.status]) stTd.classList.add(cls[row.status]);
  tr.appendChild(stTd);

  // Value columns
  row.values.forEach(function(v) {
    // File A – show normalised number or raw text
    const aTd = document.createElement('td');
    aTd.className = 'num';
    aTd.textContent = (v.isNumeric && v.aNum !== null && v.aVal !== '')
      ? v.aNum.toFixed(2) : v.aVal;
    tr.appendChild(aTd);

    // File B
    const bTd = document.createElement('td');
    bTd.className = 'num';
    bTd.textContent = (v.isNumeric && v.bNum !== null && v.bVal !== '')
      ? v.bNum.toFixed(2) : v.bVal;
    tr.appendChild(bTd);

    // Diff
    const dTd = document.createElement('td');
    dTd.className = 'num';
    if (v.diff !== null) {
      dTd.textContent = (v.diff >= 0 ? '+' : '') + v.diff.toFixed(2);
      dTd.classList.add(v.diff === 0 ? 'diff-zero' : 'diff-nonzero');
    } else {
      dTd.textContent = '—';
      dTd.classList.add('diff-text');
    }
    tr.appendChild(dTd);
  });

  return tr;
}

function renderVisibleRows() {
  const container = document.getElementById('tableContainer');
  const tbody     = document.getElementById('tableBody');
  const total     = state.filtered.length;
  const cc        = colCount();

  const scrollTop    = container.scrollTop;
  const headH        = document.getElementById('tableHead').offsetHeight || 42;
  const viewH        = container.clientHeight - headH;

  const startIdx = Math.max(0,     Math.floor(scrollTop / ROW_H) - OVER);
  const endIdx   = Math.min(total, Math.ceil((scrollTop + viewH) / ROW_H) + OVER);

  const frag = document.createDocumentFragment();

  // Top spacer
  if (startIdx > 0) {
    const sp = document.createElement('tr');
    sp.className = 'virt-spacer';
    sp.style.height = (startIdx * ROW_H) + 'px';
    const td = document.createElement('td');
    td.colSpan = cc; sp.appendChild(td); frag.appendChild(sp);
  }

  for (let i = startIdx; i < endIdx; i++) {
    frag.appendChild(buildDataRow(state.filtered[i]));
  }

  // Bottom spacer
  if (endIdx < total) {
    const sp = document.createElement('tr');
    sp.className = 'virt-spacer';
    sp.style.height = ((total - endIdx) * ROW_H) + 'px';
    const td = document.createElement('td');
    td.colSpan = cc; sp.appendChild(td); frag.appendChild(sp);
  }

  tbody.innerHTML = '';
  tbody.appendChild(frag);
}

function renderTable() {
  // Header
  const thead = document.getElementById('tableHead');
  thead.innerHTML = '';
  const hRow = document.createElement('tr');

  function makeTh(label, sortKey) {
    const th = document.createElement('th');
    th.textContent = label;
    if (sortKey) {
      th.classList.add('sortable');
      th.dataset.column = sortKey;
      th.addEventListener('click', function() { doSort(sortKey); });
    }
    return th;
  }

  hRow.appendChild(makeTh('Key', 'key'));
  hRow.appendChild(makeTh('Status', 'status'));
  state.valueColumns.forEach(function(col, colIdx) {
    hRow.appendChild(makeTh(col + ' (A)'));
    hRow.appendChild(makeTh(col + ' (B)'));
    hRow.appendChild(makeTh(col + ' (Diff)', 'diff:' + colIdx));
  });
  thead.appendChild(hRow);

  // Attach scroll handler once
  const container = document.getElementById('tableContainer');
  if (!scrollBound) {
    container.addEventListener('scroll', renderVisibleRows, { passive: true });
    scrollBound = true;
  }
  container.scrollTop = 0;
  document.getElementById('resultsTable').classList.remove('hidden');
  renderVisibleRows();
}

// ════════════════════════════════════════════════════════════════
// Sort & filter
// ════════════════════════════════════════════════════════════════
function doSort(col) {
  state.sortAsc = (state.sortColumn === col) ? !state.sortAsc : true;
  state.sortColumn = col;

  state.filtered.sort(function(a, b) {
    let av, bv;

    if (col.startsWith('diff:')) {
      const idx = parseInt(col.slice(5), 10);
      const va = a.values[idx], vb = b.values[idx];
      // Sort by absolute diff size; nulls (non-numeric / only-in-X) go last
      av = (va && va.diff !== null) ? Math.abs(va.diff) : -1;
      bv = (vb && vb.diff !== null) ? Math.abs(vb.diff) : -1;
    } else {
      av = col === 'key' ? a.key : a.status;
      bv = col === 'key' ? b.key : b.status;
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
    }

    if (av < bv) return state.sortAsc ? -1 : 1;
    if (av > bv) return state.sortAsc ?  1 : -1;
    return 0;
  });

  document.querySelectorAll('th.sortable').forEach(function(th) {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.column === col)
      th.classList.add(state.sortAsc ? 'sorted-asc' : 'sorted-desc');
  });

  document.getElementById('tableContainer').scrollTop = 0;
  renderVisibleRows();
}

function applyFilters() {
  const query  = document.getElementById('searchInput').value.toLowerCase().trim();
  const active = document.querySelector('.pill.active');
  const filter = active ? active.dataset.filter : '';

  const statusMap = {
    'match': 'Match', 'difference': 'Difference',
    'only-in-a': 'Only in A', 'only-in-b': 'Only in B',
  };

  state.filtered = state.results.filter(function(row) {
    if (filter && row.status !== statusMap[filter]) return false;
    if (query  && !String(row.key).toLowerCase().includes(query)) return false;
    return true;
  });

  document.getElementById('tableContainer').scrollTop = 0;
  renderVisibleRows();
}

// ════════════════════════════════════════════════════════════════
// Export
// ════════════════════════════════════════════════════════════════
function csvCell(v) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportCSV() {
  let csv = 'Key,Status';
  state.valueColumns.forEach(function(col) {
    csv += ',' + csvCell(col + ' (A)') + ',' + csvCell(col + ' (B)') + ',' + csvCell(col + ' (Diff)');
  });
  csv += '\n';

  state.results.forEach(function(row) {
    csv += csvCell(row.key) + ',' + csvCell(row.status);
    row.values.forEach(function(v) {
      csv += ',' + csvCell(v.aVal) + ',' + csvCell(v.bVal);
      csv += ',' + (v.diff !== null ? v.diff.toFixed(2) : '');
    });
    csv += '\n';
  });

  const link = document.createElement('a');
  link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  link.download = 'comparison-results.csv';
  link.click();
}

// ════════════════════════════════════════════════════════════════
// Reset
// ════════════════════════════════════════════════════════════════
function resetAll() {
  if (activeWorker) { activeWorker.terminate(); activeWorker = null; }
  Object.assign(state, {
    fileA: null, fileB: null, columnsA: [], columnsB: [],
    results: [], filtered: [], valueColumns: [],
    sortColumn: null, sortAsc: true,
  });
  ['fileNameA','fileNameB'].forEach(function(id) { document.getElementById(id).textContent = ''; });
  ['fileInputA','fileInputB'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('configSection').classList.add('hidden');
  document.getElementById('statusBar').classList.add('hidden');
  document.getElementById('controlsBar').classList.add('hidden');
  document.getElementById('resultsTable').classList.add('hidden');
  document.getElementById('emptyState').classList.remove('hidden');
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
  document.querySelector('.pill[data-filter=""]').classList.add('active');
  setLoading(false);
}

// ════════════════════════════════════════════════════════════════
// Wire up events
// ════════════════════════════════════════════════════════════════
setupUploadZone('uploadZoneA', 'fileInputA', 'A');
setupUploadZone('uploadZoneB', 'fileInputB', 'B');

document.getElementById('compareBtn').addEventListener('click', function() {
  const keyCol  = document.getElementById('keyColumn').value;
  const valCols = Array.from(
    document.querySelectorAll('#valueColumnsGroup input[type="checkbox"]:checked')
  ).map(function(cb) { return cb.value; });

  if (!keyCol)         { alert('Please select a key column.'); return; }
  if (!valCols.length) { alert('Please select at least one value column.'); return; }

  runComparison(keyCol, valCols);
});

document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('exportBtn').addEventListener('click', exportCSV);
document.getElementById('searchInput').addEventListener('input', applyFilters);

document.querySelectorAll('.pill').forEach(function(pill) {
  pill.addEventListener('click', function() {
    document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
    pill.classList.add('active');
    applyFilters();
  });
});

document.getElementById('keyColumn').addEventListener('change', function() {
  document.getElementById('compareBtn').disabled = !this.value;
});
</script>
